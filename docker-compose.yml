version: "3.9"

name: ai-education

services:
  # ─── 前端 ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: edu-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - edu-network
    restart: unless-stopped

  # ─── 后端 API ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: edu-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - edu-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edu-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edulab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edulab_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_education}
    volumes:
      - edu-postgres-data:/var/lib/postgresql/data
    networks:
      - edu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edulab} -d ${POSTGRES_DB:-ai_education}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edu-redis
    ports:
      - "6379:6379"
    volumes:
      - edu-redis-data:/data
    networks:
      - edu-network
    restart: unless-stopped

  # ─── Qdrant 向量数据库 ───────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edu-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - edu-qdrant-data:/qdrant/storage
    networks:
      - edu-network
    restart: unless-stopped

  # ─── Nginx 反向代理（生产用） ───────────────────
  nginx:
    image: nginx:alpine
    container_name: edu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - edu-network
    profiles:
      - production
    restart: unless-stopped

networks:
  edu-network:
    driver: bridge

volumes:
  edu-postgres-data:
  edu-redis-data:
  edu-qdrant-data:

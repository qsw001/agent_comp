name: ai-education

services:
  # ─── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edu-postgres
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edulab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edulab_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_education}
    volumes:
      - edu-postgres-data:/var/lib/postgresql/data
    networks:
      - edu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edulab} -d ${POSTGRES_DB:-ai_education}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edu-redis
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - edu-redis-data:/data
    networks:
      - edu-network
    restart: unless-stopped

  # ─── Qdrant 向量数据库 ───────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edu-qdrant
    ports:
      - "${QDRANT_PORT_EXTERNAL:-6333}:6333"
      - "6334:6334"
    volumes:
      - edu-qdrant-data:/qdrant/storage
    networks:
      - edu-network
    restart: unless-stopped

networks:
  edu-network:
    driver: bridge

volumes:
  edu-postgres-data:
  edu-redis-data:
  edu-qdrant-data:
